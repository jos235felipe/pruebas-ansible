---
- name: Crear scripts START JBoss dinámicos (NOC)
  hosts: all
  gather_facts: no

  vars:
    jboss_root: "C:\\Temenos\\R18\\3rdParty\\As"
    noc_base: "C:\\NOC"
    noc_start_dir: "C:\\NOC\\START JBoss"
    java_home: "C:\\Temenos\\R18\\3rdParty\\Java\\jdk1.8.0_181"
    tafj_home: "C:\\Temenos\\R18\\TAFJ"
    server_ip: "{{ ansible_host }}"

  tasks:

    - name: Asegurar carpeta C:\NOC
      win_file:
        path: "{{ noc_base }}"
        state: directory

    - name: Asegurar carpeta C:\NOC\START JBoss
      win_file:
        path: "{{ noc_start_dir }}"
        state: directory

    - name: Obtener carpetas JBoss
      win_find:
        paths: "{{ jboss_root }}"
        file_type: directory
      register: jboss_dirs

    - name: Identificar JBoss principal
      set_fact:
        jboss_principal: "{{ jboss_dirs.files | map(attribute='filename') | select('equalto','jboss-eap-7.2') | list | first }}"

    - name: Identificar JBoss secundarios (01 y 02)
      set_fact:
        jboss_secundarios: "{{ jboss_dirs.files | map(attribute='filename') | select('match','.*(01|02).*') | sort | list }}"

    - name: Validar que existan 2 JBoss secundarios
      fail:
        msg: "No se detectaron exactamente 2 JBoss secundarios (01 y 02). Detectados: {{ jboss_secundarios }}"
      when: jboss_secundarios | length != 2

    # =========================
    # JBoss PRINCIPAL
    # =========================
    - name: Crear BAT JBoss Principal (8081)
      win_copy:
        dest: "{{ noc_start_dir }}\\START_JBOSS_PRINCIPAL.bat"
        force: no
        content: |
          @echo off
          REM =====================================================
          REM START JBOSS PRINCIPAL
          REM =====================================================

          set JAVA_HOME={{ java_home }}
          set TAFJ_HOME={{ tafj_home }}
          set JBOSS_HOME={{ jboss_root }}\{{ jboss_principal }}

          set PATH=%JAVA_HOME%\bin;%TAFJ_HOME%\bin;%JBOSS_HOME%\bin;%PATH%

          set "JAVA_OPTS=-Xms28G -Xmx28G -XX:+UseParallelGC"
          set "JAVA_OPTS=%JAVA_OPTS% -XX:MetaspaceSize=256M -XX:MaxMetaspaceSize=28G"
          set "JAVA_OPTS=%JAVA_OPTS% -XX:ReservedCodeCacheSize=750M"
          set "JAVA_OPTS=%JAVA_OPTS% -Djava.net.preferIPv4Stack=true"
          set "JAVA_OPTS=%JAVA_OPTS% -Dactivemq.artemis.client.global.thread.pool.max.size=256"
          set "JAVA_OPTS=%JAVA_OPTS% -Djboss.modules.system.pkgs=org.jboss.byteman"

          set "JAVA_OPTS=%JAVA_OPTS% -Djboss.server.base.dir=%JBOSS_HOME%\standalone"
          set "JAVA_OPTS=%JAVA_OPTS% -Djboss.node.name=node1"
          set "JAVA_OPTS=%JAVA_OPTS% -Djboss.socket.binding.port-offset=0"
          set "JAVA_OPTS=%JAVA_OPTS% -Dtafj.home=%TAFJ_HOME%"
          set "JAVA_OPTS=%JAVA_OPTS% -Dfile.encoding=UTF-8"
          set "JAVA_OPTS=%JAVA_OPTS% -Ddsf.iris18.host=http://{{ server_ip }}:8081/dsf-iris"

          cd /d %JBOSS_HOME%\bin
          start "JBOSS_PRINCIPAL" standalone.bat ^
           --server-config=t24.xml ^
           -b 0.0.0.0 ^
           -bmanagement=0.0.0.0

          exit /b 0

    # =========================
    # JBoss 8181
    # =========================
    - name: Crear BAT JBoss 8181
      win_copy:
        dest: "{{ noc_start_dir }}\\START_JBOSS_8181.bat"
        force: no
        content: |
          @echo off
          REM =====================================================
          REM START JBOSS 8181
          REM =====================================================

          set JAVA_HOME={{ java_home }}
          set TAFJ_HOME={{ tafj_home }}
          set JBOSS_HOME={{ jboss_root }}\{{ jboss_secundarios[0] }}

          set PATH=%JAVA_HOME%\bin;%TAFJ_HOME%\bin;%JBOSS_HOME%\bin;%PATH%

          set "JAVA_OPTS=-Xms28G -Xmx28G -XX:+UseParallelGC"
          set "JAVA_OPTS=%JAVA_OPTS% -XX:MetaspaceSize=256M -XX:MaxMetaspaceSize=28G"
          set "JAVA_OPTS=%JAVA_OPTS% -XX:ReservedCodeCacheSize=750M"
          set "JAVA_OPTS=%JAVA_OPTS% -Djava.net.preferIPv4Stack=true"
          set "JAVA_OPTS=%JAVA_OPTS% -Dactivemq.artemis.client.global.thread.pool.max.size=256"
          set "JAVA_OPTS=%JAVA_OPTS% -Djboss.modules.system.pkgs=org.jboss.byteman"

          set "JAVA_OPTS=%JAVA_OPTS% -Djboss.server.base.dir=%JBOSS_HOME%\standalone"
          set "JAVA_OPTS=%JAVA_OPTS% -Djboss.node.name=node1"
          set "JAVA_OPTS=%JAVA_OPTS% -Djboss.socket.binding.port-offset=100"
          set "JAVA_OPTS=%JAVA_OPTS% -Dtafj.home=%TAFJ_HOME%"
          set "JAVA_OPTS=%JAVA_OPTS% -Dfile.encoding=UTF-8"
          set "JAVA_OPTS=%JAVA_OPTS% -Ddsf.iris18.host=http://{{ server_ip }}:8181/dsf-iris"

          cd /d %JBOSS_HOME%\bin
          start "JBOSS_8181" standalone.bat ^
           --server-config=t24.xml ^
           -b 0.0.0.0 ^
           -bmanagement=0.0.0.0

          exit /b 0

    # =========================
    # JBoss 8281
    # =========================
    - name: Crear BAT JBoss 8281
      win_copy:
        dest: "{{ noc_start_dir }}\\START_JBOSS_8281.bat"
        force: no
        content: |
          @echo off
          REM =====================================================
          REM START JBOSS 8281
          REM =====================================================

          set JAVA_HOME={{ java_home }}
          set TAFJ_HOME={{ tafj_home }}
          set JBOSS_HOME={{ jboss_root }}\{{ jboss_secundarios[1] }}

          set PATH=%JAVA_HOME%\bin;%TAFJ_HOME%\bin;%JBOSS_HOME%\bin;%PATH%

          set "JAVA_OPTS=-Xms28G -Xmx28G -XX:+UseParallelGC"
          set "JAVA_OPTS=%JAVA_OPTS% -XX:MetaspaceSize=256M -XX:MaxMetaspaceSize=28G"
          set "JAVA_OPTS=%JAVA_OPTS% -XX:ReservedCodeCacheSize=750M"
          set "JAVA_OPTS=%JAVA_OPTS% -Djava.net.preferIPv4Stack=true"
          set "JAVA_OPTS=%JAVA_OPTS% -Dactivemq.artemis.client.global.thread.pool.max.size=256"
          set "JAVA_OPTS=%JAVA_OPTS% -Djboss.modules.system.pkgs=org.jboss.byteman"

          set "JAVA_OPTS=%JAVA_OPTS% -Djboss.server.base.dir=%JBOSS_HOME%\standalone"
          set "JAVA_OPTS=%JAVA_OPTS% -Djboss.node.name=node1"
          set "JAVA_OPTS=%JAVA_OPTS% -Djboss.socket.binding.port-offset=200"
          set "JAVA_OPTS=%JAVA_OPTS% -Dtafj.home=%TAFJ_HOME%"
          set "JAVA_OPTS=%JAVA_OPTS% -Dfile.encoding=UTF-8"
          set "JAVA_OPTS=%JAVA_OPTS% -Ddsf.iris18.host=http://{{ server_ip }}:8281/dsf-iris"

          cd /d %JBOSS_HOME%\bin
          start "JBOSS_8281" standalone.bat ^
           --server-config=t24.xml ^
           -b 0.0.0.0 ^
           -bmanagement=0.0.0.0

          exit /b 0
