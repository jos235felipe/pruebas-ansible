---
- name: Crear tareas programadas NOC para inicio de JBoss
  hosts: all
  gather_facts: no

  vars:
    noc_folder: "NOC"
    base_path: "C:\\NOC\\START JBoss"

    # Usuario dinámico (equivalente a whoami)
    task_user: "{{ ansible_user }}"

    tasks_def:
      - name: START_JBOSS_PRINCIPAL
        bat: "START_JBOSS_PRINCIPAL.bat"

      - name: START_JBOSS_8181
        bat: "START_JBOSS_8181.bat"

      - name: START_JBOSS_8281
        bat: "START_JBOSS_8281.bat"

  tasks:

    - name: Mostrar usuario con el que se ejecuta el playbook
      debug:
        msg: "La tarea se creará usando el usuario: {{ task_user }}"

    - name: Asegurar carpeta NOC en Task Scheduler
      win_scheduled_task:
        name: "_folder_init"
        path: "\\{{ noc_folder }}"
        state: present
      changed_when: false
      failed_when: false

    - name: Crear tareas JBoss en Task Scheduler
      block:

        - name: Validar existencia del BAT {{ item.bat }}
          win_stat:
            path: "{{ base_path }}\\{{ item.bat }}"
          register: bat_check

        - name: BAT no encontrado, se omite tarea
          debug:
            msg: "SKIPPED: No existe {{ base_path }}\\{{ item.bat }}"
          when: not bat_check.stat.exists

        - name: Verificar si la tarea {{ item.name }} ya existe
          win_scheduled_task:
            name: "{{ item.name }}"
            path: "\\{{ noc_folder }}"
            state: query
          register: task_check
          failed_when: false
          changed_when: false
          when: bat_check.stat.exists

        - name: La tarea ya existe, se omite
          debug:
            msg: "SKIPPED: La tarea {{ item.name }} ya está creada"
          when:
            - bat_check.stat.exists
            - task_check.exists | default(false)

        - name: Crear tarea {{ item.name }}
          win_scheduled_task:
            name: "{{ item.name }}"
            path: "\\{{ noc_folder }}"
            description: "Inicio manual de JBoss - {{ item.name }}"
            actions:
              - path: "{{ base_path }}\\{{ item.bat }}"
                working_directory: "{{ base_path }}"
            triggers: []            # Sin triggers
            username: "{{ task_user }}"
            logon_type: password    # Run whether user is logged on or not
            run_level: highest
            compatibility: win8    # Windows Server 2022
            enabled: yes
            settings:
              allow_demand_start: yes
              start_when_available: yes
              disallow_start_if_on_batteries: no
              stop_if_going_on_batteries: no
              multiple_instances: ignore_new
              restart_count: 0
              execution_time_limit: PT0S
            state: present
          when:
            - bat_check.stat.exists
            - not task_check.exists | default(false)

      loop: "{{ tasks_def }}"
      loop_control:
        label: "{{ item.name }}"
