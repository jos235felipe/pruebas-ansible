---
# =============================================================
# Playbook: Crear tareas START_JBOSS en Task Scheduler\NOC
# Target: Windows Server 2022
# Requiere: colección ansible.windows (win_shell, win_stat, win_copy, win_file)
# VARIABLES REQUERIDAS EN AWX (extra_vars / Survey):
#   task: contraseña del usuario de ejecución (campo tipo password)
# =============================================================
- name: Crear tareas programadas START_JBOSS en carpeta NOC
  hosts: all
  gather_facts: false

  vars:
    noc_task_folder: "NOC"
    bat_base_path: "C:\\NOC\\START JBoss"
    jboss_tasks:
      - name: "START_JBOSS_PRINCIPAL"
        bat_file: "START_JBOSS_PRINCIPAL.bat"
      - name: "START_JBOSS_8181"
        bat_file: "START_JBOSS_8181.bat"
      - name: "START_JBOSS_8281"
        bat_file: "START_JBOSS_8281.bat"

  tasks:

    - name: Validar que la variable task fue proporcionada
      ansible.builtin.fail:
        msg: >
          [ERROR] La variable 'task' es requerida y no fue proporcionada.
          Agrégala como extra_var o Survey en el Job Template de AWX (campo tipo password).
      when: task is not defined or task == ""

    - name: Obtener usuario dinámico de ejecución (whoami)
      ansible.windows.win_shell: whoami
      register: current_user_raw
      changed_when: false

    - name: Fijar variable con el usuario detectado
      ansible.builtin.set_fact:
        exec_user: "{{ current_user_raw.stdout | trim }}"

    - name: Mostrar usuario que se usará como Principal de las tareas
      ansible.builtin.debug:
        msg: "Usuario dinámico detectado: {{ exec_user }} (LogonType=Password, sin S4U)"

    - name: Verificar si cada .bat existe en disco
      ansible.windows.win_stat:
        path: "{{ bat_base_path }}\\{{ item.bat_file }}"
      loop: "{{ jboss_tasks }}"
      loop_control:
        label: "{{ item.name }}"
      register: bat_check

    - name: Verificar si cada tarea ya existe en el Task Scheduler
      ansible.windows.win_shell: >
        schtasks /Query /TN "\{{ noc_task_folder }}\{{ item.name }}" 2>$null
      loop: "{{ jboss_tasks }}"
      loop_control:
        label: "{{ item.name }}"
      register: task_check
      changed_when: false
      failed_when: false

    - name: Construir lista combinada de estado por tarea (bat existe / tarea existe)
      ansible.builtin.set_fact:
        task_status: "{{ task_status | default([]) + [ {
            'name': item.0.item.name,
            'bat_file': item.0.item.bat_file,
            'bat_exists': item.0.stat.exists,
            'task_exists': (item.1.rc == 0)
          } ] }}"
      loop: "{{ bat_check.results | zip(task_check.results) | list }}"
      loop_control:
        label: "{{ item.0.item.name }}"

    - name: Avisar y SKIP — archivo .bat no encontrado
      ansible.builtin.debug:
        msg: >
          [SKIP] No se encontró el archivo {{ bat_base_path }}\{{ item.bat_file }}
          para la tarea {{ item.name }}. No se creará esta tarea.
      loop: "{{ task_status }}"
      loop_control:
        label: "{{ item.name }}"
      when: not item.bat_exists

    - name: Avisar y SKIP — la tarea ya existe (detectada antes de crear)
      ansible.builtin.debug:
        msg: >
          [SKIP] La tarea \{{ noc_task_folder }}\{{ item.name }} ya existe en el
          Task Scheduler. No se vuelve a crear (no se sobrescribe).
      loop: "{{ task_status }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.bat_exists and item.task_exists

    - name: Generar XML temporal de definición de tarea (solo si aplica crear)
      ansible.windows.win_copy:
        dest: "C:\\Windows\\Temp\\{{ item.name }}.xml"
        content: |
          <?xml version="1.0" encoding="UTF-16"?>
          <Task version="1.4" xmlns="http://schemas.microsoft.com/windows/2004/02/mit/task">
            <RegistrationInfo>
              <Description>Tarea NOC - {{ item.name }} (creada via Ansible)</Description>
            </RegistrationInfo>
            <Triggers />
            <Principals>
              <Principal id="Author">
                <UserId>{{ exec_user }}</UserId>
                <!-- PASSWORD: Do not store password DESACTIVADO, credenciales almacenadas de forma segura -->
                <LogonType>Password</LogonType>
                <RunLevel>LeastPrivilege</RunLevel>
              </Principal>
            </Principals>
            <Settings>
              <MultipleInstancesPolicy>Parallel</MultipleInstancesPolicy>
              <DisallowStartIfOnBatteries>false</DisallowStartIfOnBatteries>
              <StopIfGoingOnBatteries>false</StopIfGoingOnBatteries>
              <!-- FORCE STOP DESACTIVADO: no mata JBoss abruptamente -->
              <AllowHardTerminate>false</AllowHardTerminate>
              <StartWhenAvailable>true</StartWhenAvailable>
              <RunOnlyIfNetworkAvailable>false</RunOnlyIfNetworkAvailable>
              <IdleSettings>
                <StopOnIdleEnd>false</StopOnIdleEnd>
                <RestartOnIdle>false</RestartOnIdle>
              </IdleSettings>
              <AllowStartOnDemand>true</AllowStartOnDemand>
              <Enabled>true</Enabled>
              <Hidden>false</Hidden>
              <RunOnlyIfIdle>false</RunOnlyIfIdle>
              <WakeToRun>false</WakeToRun>
              <ExecutionTimeLimit>PT0S</ExecutionTimeLimit>
              <Priority>7</Priority>
            </Settings>
            <Actions Context="Author">
              <Exec>
                <Command>{{ bat_base_path }}\{{ item.bat_file }}</Command>
                <WorkingDirectory>{{ bat_base_path }}</WorkingDirectory>
              </Exec>
            </Actions>
          </Task>
      loop: "{{ task_status }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.bat_exists and not item.task_exists
      register: xml_generated

    - name: Crear la tarea en Task Scheduler\NOC a partir del XML (sin ejecutarla)
      ansible.windows.win_shell: >
        schtasks /Create
        /TN "\{{ noc_task_folder }}\{{ item.item.name }}"
        /XML "C:\Windows\Temp\{{ item.item.name }}.xml"
        /RU "{{ exec_user }}"
        /RP "{{ task_password }}"
      loop: "{{ xml_generated.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item is not skipped
      register: task_created
      changed_when: task_created.rc == 0
      no_log: true   # Evita que la contraseña aparezca en los logs de AWX
      failed_when:
        - task_created.rc != 0
        - "'already exists' not in task_created.stderr"

    - name: Confirmar tareas creadas exitosamente
      ansible.builtin.debug:
        msg: "[OK] Tarea \\{{ noc_task_folder }}\\{{ item.item.item.name }} creada correctamente (Password logon, force stop desactivado)."
      loop: "{{ task_created.results }}"
      loop_control:
        label: "{{ item.item.item.name }}"
      when: item is not skipped and item.rc == 0

    - name: Avisar y SKIP — la tarea ya existía al momento de crearla (detección tardía)
      ansible.builtin.debug:
        msg: >
          [SKIP] La tarea \{{ noc_task_folder }}\{{ item.item.item.name }} ya existía
          en el Task Scheduler al momento de crearla. No se modificó.
      loop: "{{ task_created.results }}"
      loop_control:
        label: "{{ item.item.item.name }}"
      when: item is not skipped and item.rc != 0

    - name: Limpiar XML temporales generados
      ansible.windows.win_file:
        path: "C:\\Windows\\Temp\\{{ item.name }}.xml"
        state: absent
      loop: "{{ task_status }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.bat_exists and not item.task_exists
