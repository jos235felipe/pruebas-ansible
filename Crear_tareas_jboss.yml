---
- name: Crear tareas programadas NOC para inicio de JBoss (schtasks)
  hosts: windows
  gather_facts: no

  vars:
    noc_folder: "NOC"
    base_path: "C:\\NOC\\START JBoss"
    task_user: "{{ ansible_user }}"

    tasks_def:
      - name: START_JBOSS_PRINCIPAL
        bat: "START_JBOSS_PRINCIPAL.bat"
      - name: START_JBOSS_8181
        bat: "START_JBOSS_8181.bat"
      - name: START_JBOSS_8281
        bat: "START_JBOSS_8281.bat"

  tasks:

    - name: Mostrar usuario con el que se ejecuta el playbook
      debug:
        msg: "Las tareas se crearán usando el usuario: {{ task_user }}"

    - name: Validar existencia del BAT
      win_stat:
        path: "{{ base_path }}\\{{ item.bat }}"
      register: bat_check
      loop: "{{ tasks_def }}"
      loop_control:
        label: "{{ item.name }}"

    - name: BAT no encontrado, se omite tarea
      debug:
        msg: "SKIPPED: No existe {{ base_path }}\\{{ item.item.bat }}"
      when: not item.stat.exists
      loop: "{{ bat_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Verificar si la tarea ya existe
      win_command: >
        schtasks /query /TN "\{{ noc_folder }}\{{ item.item.name }}"
      register: task_check
      failed_when: false
      changed_when: false
      when: item.stat.exists
      loop: "{{ bat_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Crear tarea con schtasks
      win_command: >
        schtasks /create
        /TN "\{{ noc_folder }}\{{ item.item.name }}"
        /TR "{{ base_path }}\{{ item.item.bat }}"
        /SC ONCE
        /ST 00:00
        /RU "{{ task_user }}"
        /RL HIGHEST
        /F
      when:
        - item.stat.exists
        - task_check.results[loop.index0].rc != 0
      loop: "{{ bat_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"
