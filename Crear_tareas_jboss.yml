---
- name: Crear tareas programadas NOC para inicio de JBoss (schtasks)
  hosts: all
  gather_facts: no

  vars:
    noc_folder: "NOC"
    base_path: "C:\\NOC\\START JBoss"
    task_user: "{{ ansible_user }}"

    tasks_def:
      - name: START_JBOSS_PRINCIPAL
        bat: START_JBOSS_PRINCIPAL.bat

      - name: START_JBOSS_8181
        bat: START_JBOSS_8181.bat

      - name: START_JBOSS_8281
        bat: START_JBOSS_8281.bat

  tasks:

    - name: Mostrar usuario en ejecución
      debug:
        msg: "Usuario dinámico: {{ task_user }}"

    - name: Procesar tareas JBoss
      loop: "{{ tasks_def }}"
      loop_control:
        label: "{{ item.name }}"
      block:

        - name: Validar existencia del BAT
          win_stat:
            path: "{{ base_path }}\\{{ item.bat }}"
          register: bat_stat

        - name: BAT no existe → skip
          debug:
            msg: "SKIPPED: No existe {{ base_path }}\\{{ item.bat }}"
          when: not bat_stat.stat.exists

        - name: Verificar si la tarea ya existe
          win_command: >
            schtasks /query
            /tn "\{{ noc_folder }}\{{ item.name }}"
          register: task_query
          failed_when: false
          changed_when: false
          when: bat_stat.stat.exists

        - name: Tarea ya existe → skip
          debug:
            msg: "SKIPPED: La tarea {{ item.name }} ya existe"
          when:
            - bat_stat.stat.exists
            - task_query.rc == 0

        - name: Crear tarea con schtasks
          win_command: >
            schtasks /create
            /tn "\{{ noc_folder }}\{{ item.name }}"
            /tr "{{ base_path }}\{{ item.bat }}"
            /sc ONCE
            /st 00:00
            /ru "{{ task_user }}"
            /rl HIGHEST
            /f
          when:
            - bat_stat.stat.exists
            - task_query.rc != 0
