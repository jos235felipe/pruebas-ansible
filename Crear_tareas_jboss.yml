---
- name: Crear tareas programadas NOC para inicio de JBoss (schtasks)
  hosts: windows
  gather_facts: no

  vars:
    noc_folder: "NOC"
    base_path: "C:\\NOC\\START JBoss"

    # Usuario con el que se ejecutará la tarea
    task_user: "{{ ansible_user }}"

    tasks_def:
      - name: START_JBOSS_PRINCIPAL
        bat: "START_JBOSS_PRINCIPAL.bat"

      - name: START_JBOSS_8181
        bat: "START_JBOSS_8181.bat"

      - name: START_JBOSS_8281
        bat: "START_JBOSS_8281.bat"

  tasks:

    - name: Mostrar usuario con el que se ejecuta el playbook
      debug:
        msg: "Las tareas se crearán usando el usuario: {{ task_user }}"

    - name: Crear tareas JBoss vía schtasks
      block:

        - name: Validar existencia del BAT {{ item.bat }}
          win_stat:
            path: "{{ base_path }}\\{{ item.bat }}"
          register: bat_check

        - name: BAT no encontrado, se omite tarea
          debug:
            msg: "SKIPPED: No existe {{ base_path }}\\{{ item.bat }}"
          when: not bat_check.stat.exists

        - name: Verificar si la tarea {{ item.name }} ya existe
          win_command: >
            schtasks /query /TN "\{{ noc_folder }}\{{ item.name }}"
          register: task_check
          failed_when: false
          changed_when: false
          when: bat_check.stat.exists

        - name: La tarea ya existe, se omite
          debug:
            msg: "SKIPPED: La tarea {{ item.name }} ya está creada"
          when:
            - bat_check.stat.exists
            - task_check.rc == 0

        - name: Crear tarea {{ item.name }} con schtasks
          win_command: >
            schtasks /create
            /TN "\{{ noc_folder }}\{{ item.name }}"
            /TR "{{ base_path }}\{{ item.bat }}"
            /SC ONCE
            /ST 00:00
            /RU "{{ task_user }}"
            /RL HIGHEST
            /F
          when:
            - bat_check.stat.exists
            - task_check.rc != 0

      loop: "{{ tasks_def }}"
      loop_control:
        label: "{{ item.name }}"
