---
- name: Limpieza controlada JBoss y TAFJEE
  hosts: windows
  gather_facts: no

  tasks:
    - name: Limpieza de logs y temporales (sin borrar deployments)
      ansible.windows.win_powershell:
        script: |
          # ==============================
          # VARIABLES BASE
          # ==============================
          $jbossBasePath = "C:\Temenos\R18\3rdParty\As\<INSTANCIA>\standalone"
          $tafjLogPath   = "C:\Temenos\R18\TAFJ\log"

          # ==============================
          # RUTAS A LIMPIAR
          # (NO incluir deployments)
          # ==============================
          $pathsToClean = @(
              "$jbossBasePath\log",
              "$jbossBasePath\tmp",
              "$jbossBasePath\data\tmp",
              $tafjLogPath
          )

          # ==============================
          # PROCESO DE LIMPIEZA
          # ==============================
          foreach ($path in $pathsToClean) {
              if (Test-Path $path) {
                  Write-Host "Limpiando: $path"

                  Get-ChildItem -Path $path -Recurse -Force -ErrorAction SilentlyContinue |
                  Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
              }
              else {
                  Write-Host "Ruta no encontrada, se omite: $path"
              }
          }

          Write-Host "Limpieza finalizada correctamente."
