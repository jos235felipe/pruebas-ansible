# ==============================================================================
# Script de Mantenimiento: Limpieza recursiva de JBoss (Logs y Temp)
# EXCLUYE DEPLOYMENTS
# ==============================================================================

# 1. Definición de Variables
$basePath = "C:\Temenos\R18\3rdParty\As\<instancia>\standalone"

# 2. Carpetas permitidas para limpieza
$pathsToClean = @(
    "$basePath\log",
    "$basePath\tmp",
    "$basePath\data\tmp"
)

# 3. Carpeta EXCLUIDA explícitamente
$excludedPath = "$basePath\deployments"

# 4. Proceso de limpieza
foreach ($path in $pathsToClean) {

    if (Test-Path $path) {

        # Protección adicional por si alguien agrega deployments por error
        if ($path -like "*deployments*") {
            Write-Host "Saltando carpeta protegida: $path" -ForegroundColor Yellow
            continue
        }

        Write-Host "Limpiando: $path" -ForegroundColor Cyan

        Get-ChildItem -Path $path -Recurse -Force -ErrorAction SilentlyContinue |
        Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
    }
}

Write-Host "Limpieza finalizada. Deployments NO fue afectado." -ForegroundColor Green
