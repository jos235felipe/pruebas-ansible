---
- name: Limpieza controlada de logs JBoss y TAFJEE
  hosts: all
  gather_facts: no

  tasks:
    - name: Limpieza de logs JBoss y TAFJEE (sin tocar deployments)
      ansible.windows.win_powershell:
        script: |
          # ==============================
          # VARIABLES BASE
          # ==============================
          $jbossRootPath = "C:\Temenos\R18\3rdParty\As"
          $tafjLogPath   = "C:\Temenos\R18\TAFJ\log"

          Write-Host "=== INICIO LIMPIEZA ==="

          # ==============================
          # DETECCIÓN INSTANCIAS JBoss
          # Principal + 01 + 02
          # ==============================
          $jbossInstances = Get-ChildItem -Path $jbossRootPath -Directory |
            Where-Object {
              $_.Name -eq "jboss-eap-7.2" -or
              $_.Name -match "01" -or
              $_.Name -match "02"
            }

          foreach ($instance in $jbossInstances) {
            $logPath = Join-Path $instance.FullName "standalone\log"

            if (Test-Path $logPath) {
              Write-Host "Limpiando logs JBoss: $logPath"

              Get-ChildItem -Path $logPath -Force -ErrorAction SilentlyContinue |
                ForEach-Object {
                  try {
                    Remove-Item $_.FullName -Recurse -Force -ErrorAction Stop
                  } catch {
                    Write-Host "No se pudo borrar: $($_.FullName)" -ForegroundColor Yellow
                  }
                }
            }
          }

          # ==============================
          # LIMPIEZA LOGS TAFJEE (CORREGIDO)
          # ==============================
          if (Test-Path $tafjLogPath) {
            Write-Host "Limpiando logs TAFJEE: $tafjLogPath"

            Get-ChildItem -Path $tafjLogPath -Force -ErrorAction SilentlyContinue |
              ForEach-Object {
                try {
                  Remove-Item $_.FullName -Recurse -Force -ErrorAction Stop
                } catch {
                  Write-Host "Archivo TAFJEE en uso o bloqueado: $($_.FullName)" -ForegroundColor Yellow
                }
              }
          }
          else {
            Write-Host "Ruta TAFJEE no encontrada"
          }

          Write-Host "=== LIMPIEZA FINALIZADA ==="
