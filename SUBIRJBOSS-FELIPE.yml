---
- name: START JBOSS DINÁMICO T24
  hosts: all
  gather_facts: no

  tasks:
    - name: Arranque dinámico de JBoss
      ansible.windows.win_powershell:
        script: |
          $AS_ROOT   = "C:\Temenos\R18\3rdParty\As"
          $JAVA_HOME = "C:\Temenos\R18\3rdParty\Java\jdk1.8.0_181"
          $TAFJ_HOME = "C:\Temenos\R18\TAFJ"

          $env:JAVA_HOME = $JAVA_HOME
          $env:TAFJ_HOME = $TAFJ_HOME
          $env:PATH = "$JAVA_HOME\bin;$TAFJ_HOME\bin;$env:PATH"

          function Start-JBoss {
              param (
                  [string]$JBOSS_HOME,
                  [string]$Name
              )

              $binPath = Join-Path $JBOSS_HOME "bin"
              $cmd = "standalone.bat --server-config=t24.xml -b 0.0.0.0 -bmanagement=0.0.0.0"

              if (Test-Path (Join-Path $binPath "standalone.bat")) {
                  Write-Host ">>> Levantando $Name"

                  cmd.exe /c `
                    "start ""JBOSS_$Name"" /min cmd /c `"$cmd`"" `
                    | Out-Null
              }
              else {
                  Write-Host "!!! standalone.bat no encontrado en $JBOSS_HOME" -ForegroundColor Red
              }
          }

          $dirs = Get-ChildItem -Path $AS_ROOT -Directory

          $principal = $dirs | Where-Object { $_.Name -eq "jboss-eap-7.2" }
          $secundarios = $dirs | Where-Object { $_.Name -match "01|02" } | Sort-Object Name

          if ($principal) {
              Start-JBoss -JBOSS_HOME $principal.FullName -Name "PRINCIPAL"
              Start-Sleep 10
          }

          foreach ($sec in $secundarios) {
              Start-JBoss -JBOSS_HOME $sec.FullName -Name $sec.Name
              Start-Sleep 10
          }

          Write-Host "=== ARRANQUE DISPARADO ==="
