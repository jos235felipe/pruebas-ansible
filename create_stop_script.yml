---
- name: Crear script STOP_ALL_JBOSS.ps1 dinámico por usuario AWX
  hosts: all
  gather_facts: no

  vars:
    jboss_base_path: 'C:\Temenos\R18\3rdParty\As'
    user_home: 'C:\Users\{{ ansible_user }}'
    script_dir: '{{ user_home }}\Desktop\START_T24'
    script_path: '{{ script_dir }}\STOP_ALL_JBOSS.ps1'

  tasks:

    - name: Validar usuario efectivo de ejecución
      win_shell: whoami
      register: whoami_out

    - name: Mostrar usuario efectivo (debug controlado)
      debug:
        msg: "Playbook ejecutado como: {{ whoami_out.stdout }}"

    - name: Crear carpeta destino START_T24 si no existe
      win_file:
        path: "{{ script_dir }}"
        state: directory

    - name: Obtener carpetas de JBoss
      win_find:
        paths: "{{ jboss_base_path }}"
        file_type: directory
      register: jboss_dirs

    - name: Filtrar JBoss secundarios válidos (solo 01 y 02)
      set_fact:
        jboss_secondary: >-
          {{ jboss_dirs.files
             | map(attribute='filename')
             | reject('equalto', 'jboss-eap-7.2')
             | select('match', '.*(01|02).*')
             | sort
             | list }}

    - name: Validar que existan exactamente 2 JBoss secundarios válidos
      fail:
        msg: >
          No se encontraron exactamente 2 JBoss secundarios (01 y 02)
          en {{ jboss_base_path }}.
          Detectados: {{ jboss_secondary }}
      when: jboss_secondary | length != 2

    - name: Crear script STOP_ALL_JBOSS.ps1
      win_copy:
        dest: "{{ script_path }}"
        content: |
          Write-Host "==========================================="
          Write-Host "  INICIO APAGADO AUTOMATICO JBoss"
          Write-Host "==========================================="

          # -------- JBoss Principal --------
          $JBOSS_CLI = "{{ jboss_base_path }}\jboss-eap-7.2\bin\jboss-cli.ps1"
          Write-Host "Apagando JBoss Principal..."
          & $JBOSS_CLI --connect --controller=localhost:9990 --command="shutdown"
          Start-Sleep -Seconds 5

          # -------- JBoss Secundario 1 --------
          $JBOSS_CLI = "{{ jboss_base_path }}\{{ jboss_secondary[0] }}\bin\jboss-cli.ps1"
          Write-Host "Apagando JBoss Secundario 1 ({{ jboss_secondary[0] }})..."
          & $JBOSS_CLI --connect --controller=localhost:10090 --command="shutdown"
          Start-Sleep -Seconds 5

          # -------- JBoss Secundario 2 --------
          $JBOSS_CLI = "{{ jboss_base_path }}\{{ jboss_secondary[1] }}\bin\jboss-cli.ps1"
          Write-Host "Apagando JBoss Secundario 2 ({{ jboss_secondary[1] }})..."
          & $JBOSS_CLI --connect --controller=localhost:10190 --command="shutdown"

          Write-Host "==========================================="
          Write-Host "  APAGADO FINALIZADO CORRECTAMENTE"
          Write-Host "==========================================="
